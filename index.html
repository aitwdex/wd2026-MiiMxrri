<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>各都市の天気</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

  <div class="container my-4">
    
    <h1 class="fs-1 fw-bold border-start border-success border-4 ps-2">各都市の天気</h1>
    <div class="row g-3 mb-4"> 
      
      <div class="col-md-4">
        <button id="getSapporoBtn" class="btn btn-primary w-100">札幌の天気を取得</button>
      </div>
      
      <div class="col-md-4">
        <button id="getSendaiBtn" class="btn btn-primary w-100">仙台の天気を取得</button>
      </div>
      
      <div class="col-md-4">
        <button id="getTokyoBtn" class="btn btn-primary w-100">東京の天気を取得</button>
      </div>
      
      <div class="col-md-4">
        <button id="getYokohamaBtn" class="btn btn-primary w-100">横浜の天気を取得</button>
      </div>
      
      <div class="col-md-4">
        <button id="getNagoyaBtn" class="btn btn-primary w-100">名古屋の天気を取得</button>
      </div>
      
      <div class="col-md-4">
        <button id="getBtn" class="btn btn-primary w-100">大阪の天気を取得</button>
      </div>
      
      <div class="col-md-4">
        <button id="getFukuokaBtn" class="btn btn-primary w-100">福岡の天気を取得</button>
      </div>
      
    </div> <div id="result" class="card shadow-lg p-3 mb-5 bg-white rounded mx-auto" style="width: 100%; max-width: 35rem;">
      <div class="card-body">
        <p id="temp" class="card-text fs-2">現在の天気</p>
      </div>
    </div>
    
  </div>


 
  <script type="module" src="js/main.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
<footer>
  <small>Weather data by <a href="https://open-meteo.com/">Open-Meteo.com</a>（CC BY 4.0）</small>
</footer>
</html>
